<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Markdown Rich Provider</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Georgia, "Noto Serif SC", serif;
      }
      body {
        margin: 0;
        background: #f5f3ef;
        color: #24211d;
      }
      main {
        box-sizing: border-box;
        max-width: 920px;
        min-height: 100vh;
        margin: 0 auto;
        padding: 48px 56px;
        background: white;
        box-shadow: 0 0 24px #302a2014;
        line-height: 1.75;
      }
      h1 {
        text-align: center;
        font-size: 2.25rem;
      }
      h2 {
        margin-top: 2rem;
        border-bottom: 1px solid #d8d1c6;
        padding-bottom: 0.35rem;
      }
      pre {
        overflow: auto;
        border-radius: 8px;
        padding: 16px;
        background: #f3f1ed;
      }
      code {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      }
      blockquote {
        margin-left: 0;
        border-left: 4px solid #9f8a68;
        padding-left: 16px;
        color: #665d50;
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      th,
      td {
        border: 1px solid #d8d1c6;
        padding: 8px 12px;
        text-align: left;
      }
      a {
        color: #76572d;
      }
      .math-inline,
      .math-block {
        font-family: "Latin Modern Math", "STIX Two Math", serif;
        font-style: italic;
      }
      .math-block {
        display: block;
        text-align: center;
        margin: 1rem 0;
      }
      .mermaid-placeholder {
        border: 1px dashed #c4b8a3;
        border-radius: 8px;
        padding: 12px 16px;
        background: #faf8f4;
      }
      .mermaid-placeholder .hint {
        margin: 0.5rem 0 0;
        font-size: 0.85rem;
        color: #7a6f60;
      }
    </style>
  </head>
  <body>
    <main id="document"><p>Waiting for Markdown…</p></main>
    <script src="provider.js"></script>
  </body>
</html>
